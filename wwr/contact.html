<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="Viewport" content="width=device-width,initial-scalled=1.0">

    <meta name="auther" content="Joseph Ochieng Odongo">

</head>

<body>
    <header>
        <img src="images/z-rapids-trees.jpg" alt="Company Logo">
        <nav>

            <a href="index.html">home</a>
            <a href="about.html">About us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">contact us</a>

        </nav>
    </header>
    <main>
        <section class="contact-inform">
            <h1>White Water Rafting</h1>
            <address>
                123 main River Streat<br>
                Kolob California 90210</br>
            </address>
            <a href="tel:+19999999999">1 999 999 9999</a>
            <a href="mailto:info@whitewater.com">info@whitewater.com</a>
        </section>
        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d17783.79053521165!2d-111.80385436991146!3d43.81446814198725!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x53540b03dc48a5cf%3A0x1e5534d3c38ef412!2sBrigham%20Young%20University-Idaho!5e1!3m2!1ssw!2ske!4v1759853383570!5m2!1ssw!2ske"
            width="400" height="300" style="border:0;" allowfullscreen="" loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"></iframe>
        <section class="employee">
            <h2>We Are Here To Serve You</h2>
            <figure class="employee">
                <img src="images/man_640x584.webp" alt="Mad Max-CEO">
                <figcaption>Mad Max-CEO</figcaption>
            </figure>
            <figure class="employee">
                <img src="images/woman-5212479_640.webp" alt="Jane Smith">
                <figcaption>Jane Smith-Safty Officer</figcaption>
            </figure>
            <figure class="employee">
                <img src="images/woman-6871495_640.webp" alt="Stacy Smith_Tour Guide">
                <figcaption></figcaption>

            </figure>
        </section>
        <form action="#" class="contact-inform">
            <div class="full-w">
                <label for="name">Name"
                    <input type="text" id="name" name="name" required placeholder="Joseph Ochieng Odongo">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" requred placeholder="josephodongo99@gmail.com">
                    <div class="purpose">
                        <p>Message Purpose:</p>
                        <fieldset>
                            <label for="inquiry">General Inquiry</label>
                            <input for="inquiry" type="radio" name="purpose" value="inquiry" required>
                            <label for="reservation">Reservation Question</label>
                            <input id="reservation" type="radio" name="Purpose" value="reservation">
                            <label for="feedback">Website Suggestion</label>
                            <input id="feedback" type="radio" name="purpose" value="feedback">
                        </fieldset>
                    </div>
                    <label for="message">Message</label>
                    <textarea id="message" name="Message" rows="4" required placeholder="Have fun"></textarea>
                    <div class="subscribe">
                        <input type="checkbox" value="yes">
                        <label for="subscribe"></label> Subscribe to our newsletter
                </label>
            </div>
            <button type="submit">Get in Touch</button>
        </form>
    </main>

    <footer>
        <p>&copy; -2025 Dry Oar Rafting</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.jpg" alt=" Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="Linkedin Icon">
            </a>
            <a href="https://instagram.company">
                <img src="images/instagram.jpg" alt="Instagram   Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
